<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Awareness Platform</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --text: #334155;
            --bg: #f8fafc;
            --card: #ffffff;
            --danger: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg); color: var(--text);
            line-height: 1.6;
        }
        header {
            background-color: var(--primary); color: white;
            padding: 1rem 2rem; display: flex;
            justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 1.5rem; }
        nav a {
            color: #94a3b8; text-decoration: none;
            margin-left: 1.5rem; font-weight: 600;
        }
        nav a:hover, nav a.active { color: white; }
        main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        section {
            background: var(--card); padding: 2rem;
            border-radius: 8px; margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .hero { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; text-align: center; }
        .checker-box { display: flex; gap: 10px; margin-top: 1rem; }
        input[type="text"] {
            flex: 1; padding: 0.75rem;
            border: 1px solid #cbd5e1; border-radius: 4px; font-size: 1rem;
        }
        button {
            background-color: var(--accent); color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 4px;
            cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: #2563eb; }
        .result-box { margin-top: 1rem; padding: 1rem; border-radius: 4px; font-weight: bold; }
        .danger { background-color: #fee2e2; color: var(--danger); border: 1px solid #fca5a5; }
        .success { background-color: #dcfce7; color: var(--success); border: 1px solid #86efac; }
        .hidden { display: none; }
        footer { text-align: center; padding: 2rem; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>ShieldUp: Phishing Awareness</h1>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="quiz/quiz.html">Take the Quiz</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Be Smart. Be Safe.</h2>
            <p>Learn how to detect cyber threats before clicking the link.</p>
        </section>

        <section class="checker-section">
            <h3>Instant URL Suspicion Checker</h3>
            <div class="checker-box">
                <input type="text" id="urlInput" placeholder="e.g., http://secure-login-paypal.com">
                <button onclick="checkURL()">Analyze URL</button>
            </div>
            <div id="checkerResult" class="result-box hidden"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Phishing Awareness Project | CodeAlpha Internship</p>
    </footer>

    <script>
        function checkURL() {
            const url = document.getElementById('urlInput').value.trim().toLowerCase();
            const resultBox = document.getElementById('checkerResult');
            
            if (!url) {
                alert("Please enter a URL to analyze.");
                return;
            }

            resultBox.classList.remove('hidden', 'danger', 'success');
            const suspiciousKeywords = ['login', 'verify', 'update', 'banking', 'secure', 'paypal', 'free-gift'];
            let isSuspicious = false;
            let reason = "";

            const ipPattern = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}/;
            
            if (ipPattern.test(url)) {
                isSuspicious = true;
                reason = "It uses a raw IP address instead of a domain name.";
            } else if (suspiciousKeywords.some(keyword => url.includes(keyword)) && !url.includes('https://')) {
                isSuspicious = true;
                reason = "It uses urgent or sensitive keywords over an unencrypted connection.";
            } else if (url.startsWith('http://')) {
                isSuspicious = true;
                reason = "It uses unencrypted 'http://' instead of secure 'https://'.";
            }

            if (isSuspicious) {
                resultBox.className = "result-box danger";
                resultBox.innerHTML = `⚠️ Phishing Risk Detected: ${reason}`;
            } else {
                resultBox.className = "result-box success";
                resultBox.innerHTML = "✅ Low Risk: No obvious structural red flags detected.";
            }
        }
    </script>
</body>
</html>
